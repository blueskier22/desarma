#slide-view { display:none; flex-direction:column; align-items:center; height:100vh; }

#slide-caption { font-size:1.2rem; font-style:italic; color:#a09080; line-height:1.5; opacity:0; transition:opacity 0.45s; }
#image-area { position:relative; width:100%; flex:1; display:flex; align-items:center; justify-content:center; overflow:hidden; }
.slide { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 0.7s; pointer-events:none; }

#side-next { right:0; background:linear-gradient(to left,rgba(0,0,0,0.35),transparent); }

.side-nav:hover .side-nav-icon { border-color:#d4b896; background:rgba(0,0,0,0.65); }
#controls { display:flex; align-items:center; gap:28px; padding:16px 0 20px; }
.arrow-btn { background:none; border:1px solid #3a3028; color:#a09080; width:42px; height:42px; border-radius:50%; cursor:pointer; font-size:1.1rem; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }

#dots { display:flex; gap:7px; flex-wrap:wrap; max-width:220px; justify-content:center; }
.dot { width:6px; height:6px; border-radius:50%; background:#3a3028; cursor:pointer; transition:background 0.3s; }
.dot.active { background:#d4b896; }
#counter { font-size:0.75rem; letter-spacing:0.15em; color:#504030; min-width:60px; text-align:center; }
#back-cover { background:none; border:none; color:#504030; font-size:0.68rem; letter-spacing:0.12em; text-transform:uppercase; cursor:pointer; padding:4px 10px; transition:color 0.2s; position:absolute; bottom:18px; left:20px; }

const slideEls = document.querySelectorAll('.slide');
const dotEls   = document.querySelectorAll('.dot');
const titleEl   = document.getElementById('slide-title');
const captionEl = document.getElementById('slide-caption');
const counterEl = document.getElementById('counter');
let current = 0;

function showCoverView() {
  document.getElementById('cover-view').style.display = 'flex';
  document.getElementById('slide-view').style.display = 'none';
}
function showSlideView(n) {
  document.getElementById('cover-view').style.display = 'none';
  document.getElementById('slide-view').style.display = 'flex';
  goTo(n);
}
function goTo(n) {
  slideEls[current].classList.remove('active'); dotEls[current].classList.remove('active');
  current = ((n % slideEls.length) + slideEls.length) % slideEls.length;
  slideEls[current].classList.add('active'); dotEls[current].classList.add('active');
  counterEl.textContent = (current+1) + ' / ' + slideEls.length;
  titleEl.style.opacity = captionEl.style.opacity = 0;
  setTimeout(() => {
    titleEl.textContent   = data[current].title;
    captionEl.textContent = data[current].caption;
    titleEl.style.opacity = captionEl.style.opacity = 1;
  }, 280);
  document.getElementById('prev').disabled = current === 0;
  document.getElementById('next').disabled = current === slideEls.length - 1;
  document.getElementById('side-prev').classList.toggle('disabled', current === 0);
  document.getElementById('side-next').classList.toggle('disabled', current === slideEls.length - 1);
}
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  goTo(current-1);
  if (e.key === 'ArrowRight') goTo(current+1);
});
titleEl.textContent   = data[0].title;
captionEl.textContent = data[0].caption;
titleEl.style.opacity = captionEl.style.opacity = 1;
document.getElementById('prev').disabled = true;
